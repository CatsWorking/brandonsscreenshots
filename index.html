<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>brandonsscreenshots</title>
    <style>
        /* CSS STYLES */
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --accent: #00ff88;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        header {
            text-align: center;
            padding: 3rem 1rem;
            background: linear-gradient(180deg, #000000 0%, var(--bg-color) 100%);
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        h1 span {
            color: var(--accent);
        }

        p.subtitle {
            color: #aaaaaa;
            margin-top: 10px;
        }

        /* Gallery Grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .gallery-item {
            position: relative;
            background-color: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            aspect-ratio: 16/9;
        }

        .gallery-item:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(0, 255, 136, 0.2);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .view-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            border: 1px solid var(--accent);
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s ease, background-color 0.3s ease;
        }

        .gallery-item:hover .view-btn {
            opacity: 1;
        }

        .view-btn:hover {
            background-color: var(--accent);
            color: black;
        }

        /* Fullscreen Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .modal.active {
            display: flex;
        }

        .modal img {
            max-width: 90%;
            max-height: 85vh;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        .modal-controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }

        .modal-btn {
            background: transparent;
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 1rem;
            border-radius: 4px;
            transition: 0.2s;
        }

        .modal-btn:hover {
            background: white;
            color: black;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 2rem;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .close-btn:hover {
            color: var(--accent);
        }

        .loading {
            text-align: center;
            font-size: 1.2rem;
            color: var(--accent);
            padding: 50px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Brandons<span>Screenshots</span></h1>
        <p class="subtitle">A collection of gaming memories and captures</p>
    </header>

    <main>
        <div id="loading" class="loading">Booting up terminal... looking for screenshots...</div>
        <div class="gallery" id="gallery">
            </div>
    </main>

    <div class="modal" id="imageModal">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <img id="modalImg" src="" alt="Fullscreen Screenshot">
        <div class="modal-controls">
            <button class="modal-btn" onclick="toggleNativeFullscreen()">Toggle True Fullscreen</button>
            <button class="modal-btn" onclick="closeModal()">Close</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 🛠️ CONFIGURATION - CHANGE THESE VARIABLES!
        // ==========================================
        const githubUsername = 'catsworking'; // e.g., 'brandon123'
        const githubRepoName = 'brandonsscreenshots'; // e.g., 'brandonsscreenshots'
        const folderName = 'media'; 
        // ==========================================

        const apiUrl = `https://api.github.com/repos/${githubUsername}/${githubRepoName}/contents/${folderName}`;
        const gallery = document.getElementById('gallery');
        const loadingText = document.getElementById('loading');
        
        // Modal Elements
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImg');

        // Fetch images from GitHub repo
        async function loadImages() {
            try {
                const response = await fetch(apiUrl);
                
                if (!response.ok) {
                    throw new Error('Could not fetch from GitHub. Check your username and repo name.');
                }

                const files = await response.json();
                loadingText.style.display = 'none';

                // Filter for image files
                const imageFiles = files.filter(file => 
                    file.type === 'file' && 
                    file.name.match(/\.(jpg|jpeg|png|gif|webp)$/i)
                );

                if (imageFiles.length === 0) {
                    gallery.innerHTML = '<p style="text-align:center; grid-column: 1/-1;">No images found in the media folder.</p>';
                    return;
                }

                // Generate HTML for each image
                imageFiles.forEach(file => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'gallery-item';

                    const img = document.createElement('img');
                    img.src = file.download_url; // Direct link to image
                    img.alt = file.name;
                    img.loading = "lazy";

                    const btn = document.createElement('button');
                    btn.className = 'view-btn';
                    btn.innerText = 'View Fullscreen';
                    btn.onclick = () => openModal(file.download_url);

                    itemDiv.appendChild(img);
                    itemDiv.appendChild(btn);
                    gallery.appendChild(itemDiv);
                });

            } catch (error) {
                console.error(error);
                loadingText.innerHTML = `⚠️ Error: Make sure your GitHub repo is PUBLIC and you updated the Username/Repo variables in the code.`;
                loadingText.style.color = '#ff4444';
            }
        }

        // Modal Functions
        function openModal(imageSrc) {
            modalImg.src = imageSrc;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden'; // Prevent scrolling in background
        }

        function closeModal() {
            modal.classList.remove('active');
            document.body.style.overflow = 'auto'; // Restore scrolling
            
            // Exit native fullscreen if active
            if (document.fullscreenElement) {
                document.exitFullscreen();
            }
        }

        // Native Browser Fullscreen
        function toggleNativeFullscreen() {
            if (!document.fullscreenElement) {
                modalImg.requestFullscreen().catch(err => {
                    alert(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        // Close modal when clicking outside the image
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeModal();
            }
        });

        // Initialize
        loadImages();
    </script>
</body>
</html>
